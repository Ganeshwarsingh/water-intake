<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0ea5e9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Water Tracker">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Water Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(160deg, #e0f2fe 0%, #bfdbfe 50%, #93c5fd 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px 14px 40px;
    -webkit-tap-highlight-color: transparent;
  }
  .app {
    width: 100%;
    max-width: 420px;
  }
  h1 {
    text-align: center;
    color: #0c4a6e;
    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .subtitle {
    text-align: center;
    color: #0369a1;
    font-size: 0.85rem;
    margin-bottom: 18px;
    opacity: 0.8;
  }
  .card {
    background: rgba(255,255,255,0.85);
    border-radius: 22px;
    padding: 22px 18px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(14,116,144,0.15);
    backdrop-filter: blur(6px);
  }
  .ring-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    margin: 0 auto 14px;
  }
  svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #dbeafe; stroke-width: 16; }
  .ring-fg {
    fill: none;
    stroke: #0ea5e9;
    stroke-width: 16;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease;
  }
  .ring-center {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .ring-count {
    font-size: 2.6rem;
    font-weight: 700;
    color: #0c4a6e;
    line-height: 1;
  }
  .ring-goal {
    font-size: 0.95rem;
    color: #0369a1;
    margin-top: 2px;
  }
  .ring-left {
    font-size: 0.8rem;
    color: #0284c7;
    margin-top: 6px;
    background: #e0f2fe;
    padding: 4px 10px;
    border-radius: 12px;
  }
  .tap-btn {
    width: 100%;
    padding: 22px;
    font-size: 1.2rem;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    border: none;
    border-radius: 18px;
    box-shadow: 0 6px 16px rgba(2,132,199,0.35);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.1s ease;
  }
  .tap-btn:active { transform: scale(0.96); }
  .tap-btn.done {
    background: linear-gradient(135deg, #22c55e, #16a34a);
  }
  .controls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
  }
  .small-btn {
    background: #e0f2fe;
    border: none;
    color: #0369a1;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .small-btn:active { background: #bae6fd; }
  .goal-edit {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .goal-edit button {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: #bae6fd;
    color: #075985;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
  }
  .goal-edit span {
    font-size: 0.9rem;
    color: #0369a1;
    font-weight: 600;
    min-width: 70px;
    text-align: center;
  }
  .card-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #0c4a6e;
    margin-bottom: 12px;
  }
  .week-row {
    display: flex;
    justify-content: space-between;
    gap: 6px;
  }
  .day-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .day-label {
    font-size: 0.7rem;
    color: #0369a1;
    font-weight: 600;
  }
  .day-dot {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    background: #e5e7eb;
    color: #9ca3af;
  }
  .day-dot.hit { background: #22c55e; color: #fff; }
  .day-dot.partial { background: #bae6fd; color: #075985; }
  .day-dot.today { box-shadow: 0 0 0 2px #0ea5e9; }
  .reset-link {
    text-align: center;
    margin-top: 6px;
  }
  .reset-link button {
    background: none;
    border: none;
    color: #0284c7;
    font-size: 0.8rem;
    text-decoration: underline;
    cursor: pointer;
  }
  .install-banner {
    display: none;
    background: #0c4a6e;
    color: #fff;
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 0.82rem;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .install-banner.show { display: flex; }
  .install-banner button {
    background: #0ea5e9;
    border: none;
    color: #fff;
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  @media (min-width: 700px) {
    body { padding: 40px 20px; align-items: flex-start; }
    .app { max-width: 480px; }
    .card { padding: 28px 26px; }
    .ring-wrap { width: 250px; height: 250px; }
    h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>💧 Water Tracker</h1>
  <div class="subtitle">Stay hydrated, one glass at a time</div>

  <div class="install-banner" id="installBanner">
    <span>Install this app on your device</span>
    <button id="installBtn">Install</button>
  </div>

  <div class="card">
    <div class="ring-wrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="94"></circle>
        <circle id="ringFg" class="ring-fg" cx="110" cy="110" r="94"
          stroke-dasharray="590.6" stroke-dashoffset="590.6"></circle>
      </svg>
      <div class="ring-center">
        <div class="ring-count" id="countText">0</div>
        <div class="ring-goal" id="goalText">of 8 glasses</div>
        <div class="ring-left" id="leftText">8 left</div>
      </div>
    </div>

    <button class="tap-btn" id="tapBtn">🥤 I drank a glass</button>

    <div class="controls-row">
      <button class="small-btn" id="undoBtn">↩ Undo last</button>
      <div class="goal-edit">
        <button id="goalDown">−</button>
        <span id="goalLabel">Goal: 8</span>
        <button id="goalUp">+</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📅 Last 7 Days</div>
    <div class="week-row" id="weekRow"></div>
  </div>

  <div class="reset-link">
    <button id="resetToday">Reset today's count</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'water-tracker-data';
const today = new Date().toISOString().slice(0,10);

let data = { goal: 8, history: {} };

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) data = JSON.parse(raw);
  } catch(e) {
    data = { goal: 8, history: {} };
  }
  if (!data.goal) data.goal = 8;
  if (!data.history) data.history = {};
  if (!data.history[today]) data.history[today] = 0;
  render();
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {
    console.error('Save failed', e);
  }
}

const ringFg = document.getElementById('ringFg');
const countText = document.getElementById('countText');
const goalText = document.getElementById('goalText');
const leftText = document.getElementById('leftText');
const tapBtn = document.getElementById('tapBtn');
const goalLabel = document.getElementById('goalLabel');
const weekRow = document.getElementById('weekRow');
const CIRC = 590.6;

function render() {
  const count = data.history[today] || 0;
  const goal = data.goal;
  const pct = Math.min(count / goal, 1);
  ringFg.setAttribute('stroke-dashoffset', CIRC - CIRC * pct);
  countText.textContent = count;
  goalText.textContent = `of ${goal} glass${goal === 1 ? '' : 'es'}`;
  const left = Math.max(goal - count, 0);
  leftText.textContent = left === 0 ? '🎉 Goal reached!' : `${left} left`;
  goalLabel.textContent = `Goal: ${goal}`;
  tapBtn.classList.toggle('done', count >= goal);
  renderWeek();
}

function renderWeek() {
  weekRow.innerHTML = '';
  const dayLabels = ['S','M','T','W','T','F','S'];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0,10);
    const count = data.history[key] || 0;
    const goal = data.goal;
    const col = document.createElement('div');
    col.className = 'day-col';
    const label = document.createElement('div');
    label.className = 'day-label';
    label.textContent = dayLabels[d.getDay()];
    const dot = document.createElement('div');
    dot.className = 'day-dot';
    if (key === today) dot.classList.add('today');
    if (count >= goal && goal > 0) {
      dot.classList.add('hit');
      dot.textContent = '✓';
    } else if (count > 0) {
      dot.classList.add('partial');
      dot.textContent = count;
    } else {
      dot.textContent = '–';
    }
    col.appendChild(label);
    col.appendChild(dot);
    weekRow.appendChild(col);
  }
}

tapBtn.addEventListener('click', () => {
  data.history[today] = (data.history[today] || 0) + 1;
  saveToStorage();
  render();
});

document.getElementById('undoBtn').addEventListener('click', () => {
  data.history[today] = Math.max((data.history[today] || 0) - 1, 0);
  saveToStorage();
  render();
});

document.getElementById('goalUp').addEventListener('click', () => {
  data.goal = Math.min(data.goal + 1, 20);
  saveToStorage();
  render();
});

document.getElementById('goalDown').addEventListener('click', () => {
  data.goal = Math.max(data.goal - 1, 1);
  saveToStorage();
  render();
});

document.getElementById('resetToday').addEventListener('click', () => {
  data.history[today] = 0;
  saveToStorage();
  render();
});

loadFromStorage();

// PWA install prompt (Android/Chrome/Edge)
let deferredPrompt;
const installBanner = document.getElementById('installBanner');
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.add('show');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBanner.classList.remove('show');
});

window.addEventListener('appinstalled', () => {
  installBanner.classList.remove('show');
});

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => {
      console.log('Service worker registration failed:', err);
    });
  });
}
</script>
</body>
</html>
